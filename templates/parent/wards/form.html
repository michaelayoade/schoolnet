{% extends "parent/base.html" %}
{% block title %}{{ 'Edit Ward' if ward else 'Add Ward' }} - Parent Portal{% endblock %}
{% block parent_content %}
<div class="mb-6">
    <a href="/parent/wards" class="text-sm text-primary-600 dark:text-primary-400 hover:underline">&larr; Back to wards</a>
</div>

<div class="max-w-lg">
    <h1 class="text-2xl font-bold text-slate-900 dark:text-white font-display mb-6">{{ 'Edit Ward' if ward else 'Add Ward' }}</h1>

    <form method="POST"
          action="{{ '/parent/wards/edit/' ~ ward.id if ward else '/parent/wards/create' }}"
          class="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 p-6 space-y-5">
        {{ request.state.csrf_form | safe }}

        <div>
            <label for="first_name" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">First Name</label>
            <input type="text" id="first_name" name="first_name" required
                   value="{{ ward.first_name if ward and ward.first_name else '' }}"
                   class="w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 px-3 py-2 text-sm text-slate-900 dark:text-white focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
        </div>

        <div>
            <label for="last_name" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Last Name</label>
            <input type="text" id="last_name" name="last_name" required
                   value="{{ ward.last_name if ward and ward.last_name else '' }}"
                   class="w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 px-3 py-2 text-sm text-slate-900 dark:text-white focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
        </div>

        <div>
            <label for="date_of_birth" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Date of Birth</label>
            <input type="date" id="date_of_birth" name="date_of_birth"
                   value="{{ ward.date_of_birth if ward and ward.date_of_birth else '' }}"
                   class="w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 px-3 py-2 text-sm text-slate-900 dark:text-white focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
        </div>

        <div>
            <label for="gender" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Gender</label>
            <select id="gender" name="gender"
                    class="w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 px-3 py-2 text-sm text-slate-900 dark:text-white focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
                <option value="">Select...</option>
                <option value="male" {{ 'selected' if ward and ward.gender == 'male' else '' }}>Male</option>
                <option value="female" {{ 'selected' if ward and ward.gender == 'female' else '' }}>Female</option>
            </select>
        </div>

        <div class="pt-4 border-t border-slate-200 dark:border-slate-700 flex items-center gap-3">
            <button type="submit"
                    class="rounded-lg bg-primary-600 px-6 py-2.5 text-sm font-medium text-white hover:bg-primary-700 transition">
                {{ 'Update Ward' if ward else 'Add Ward' }}
            </button>
            <a href="/parent/wards"
               class="rounded-lg border border-slate-300 dark:border-slate-600 px-6 py-2.5 text-sm font-medium text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
